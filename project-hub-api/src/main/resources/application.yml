spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: project-hub-api
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

project-hub:
  external-members:
    base-url: ${EXTERNAL_MEMBERS_BASE_URL}
  security:
    cors-allowed-origins: ${PROJECT_HUB_CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${PROJECT_HUB_JWT_SECRET}
    access-token-expiration-minutes: ${PROJECT_HUB_JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${PROJECT_HUB_JWT_REFRESH_EXPIRATION_DAYS:7}
  bootstrap:
    admin:
      username: ${PROJECT_HUB_BOOTSTRAP_ADMIN_USERNAME:}
      password: ${PROJECT_HUB_BOOTSTRAP_ADMIN_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.luccadumas.projecthub: INFO
