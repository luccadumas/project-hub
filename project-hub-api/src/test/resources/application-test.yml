spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///project_hub
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

project-hub:
  external-members:
    base-url: http://localhost:${local.server.port:8080}
